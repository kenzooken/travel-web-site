<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#dff0e9 0%,#c5ddd1 50%,#ddeee5 100%);">
            <div class="booking-form" style="max-width:400px;width:100%;box-shadow:0 8px 32px rgba(44,90,62,0.10);">
                <h2 style="text-align:center;font-family:'Playfair Display',serif;font-size:2rem;color:#1a4731;margin-bottom:1.2rem;">Ro'yxatdan o'tish</h2>
                <form>
                    <div class="form-group">
                        <label for="fullname">To'liq ism</label>
                        <input type="text" id="fullname" name="fullname" placeholder="Ismingizni kiriting" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Elektron pochta</label>
                        <input type="email" id="email" name="email" placeholder="Emailingizni kiriting" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Parol</label>
                        <input type="password" id="password" name="password" placeholder="Parolingizni kiriting" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Parolni tasdiqlang</label>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Parolni qayta kiriting" required>
                    </div>
                    <a  href="welcome.html" class="hero-btn" style="width:100%;margin-top:1.2rem;">Ro'yxatdan o'tish</a >
                </form>
                <p style="text-align:center;margin-top:1.2rem;font-size:0.98rem;">Hisobingiz bormi? <a href="kirish.html" style="color:#ff6b1a;">Kirish</a></p>
            </div>
        </div>
</body>
</html>
